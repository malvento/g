<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подпишись</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1a2e;
            padding: 50px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.2);
            border: 1px solid #00ccff;
        }
        .container h1 {
            font-size: 28px;
            color: #00ccff;
            margin-bottom: 20px;
        }
        .container p {
            font-size: 20px;
            color: #e0e0e0;
            margin: 0 0 20px 0;
        }
        .container .highlight {
            color: #ffcc00;
            font-weight: bold;
            background: #2a2a40;
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
        }
        .container .btn {
            display: inline-block;
            background: #00ccff;
            color: #0a0a0a;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }
        .container .btn:hover {
            background: #ffcc00;
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffcc00;
        }
        .container .sub {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📢 Подпишись</h1>
        <p>Подпишись на <span class="highlight">@zoluxupdates</span></p>
        <a href="https://t.me/zoluxupdates" target="_blank" class="btn">Подписаться</a>
        <div class="sub">Нажми на кнопку, чтобы подписаться</div>
    </div>
</body>
</html>
